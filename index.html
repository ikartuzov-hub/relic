<style>
/* ============================================================
   RELIC — витрина (полный путь). Категория: монеты.
   Три слоя (universal-build-standard):
   1) ДВИЖОК  — этот файл: роутинг, рендер, переключатели
   2) ЛОКАЛИ  — объект L ниже. Живые: ru/en/pt. Задел: de/es/fr
   3) КОНТЕНТ — внутри локалей (тексты поверхностей)
   Маршрут (route-archive): intro → демо → листовка → продать → метод
   Мосты: «оценить свою» → @RelicFindBot ; футер → Hub
   ============================================================ */
:root{
  --bg:#1a140d; --ink:#f3ede2; --ink-dim:#cbb89a; --mute:#9a8a6e;
  --accent:#C0894B; --line:#3a2e1f; --surface:#241a10; --surface-2:#2a2016;
  --ok-bg:#1d3b2a; --ok-fg:#8fd4a8; --mid-bg:#3a2e12; --mid-fg:#e0bd6a;
}
:root[data-theme="light"]{
  --bg:#f3ede2; --ink:#2a2016; --ink-dim:#5a4a36; --mute:#8a7659;
  --accent:#8a5a24; --line:#d8cbb0; --surface:#fbf7ef; --surface-2:#efe7d8;
  --ok-bg:#dff0e4; --ok-fg:#2f6e45; --mid-bg:#f4e6c6; --mid-fg:#8a6512;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Manrope',system-ui,sans-serif;
  min-height:100vh;display:flex;justify-content:center;transition:background .4s,color .4s}
.app{width:100%;max-width:440px;min-height:100vh;display:flex;flex-direction:column;position:relative}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 4px;flex:0 0 auto}
.brandmark{width:26px;height:26px}
.tools{display:flex;align-items:center;gap:4px}
.tbtn{background:none;border:none;color:var(--mute);font-size:15px;cursor:pointer;padding:6px 8px;line-height:1;border-radius:8px}
.tbtn:hover{color:var(--accent)}
.tbtn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@keyframes markIn{
  0%{transform:translate(calc(50vw - 33px),42vh) scale(8);opacity:0}
  18%{opacity:1} 70%{transform:translate(calc(50vw - 33px),42vh) scale(8)}
  100%{transform:translate(0,0) scale(1)}}
.brandmark.reveal{animation:markIn 2.3s cubic-bezier(.65,0,.25,1) both}
@media(prefers-reduced-motion:reduce){.brandmark.reveal{animation:none}}

.view{flex:1;display:none;flex-direction:column;padding:8px 24px 26px}
.view.on{display:flex}
.eyebrow{color:var(--accent);font-size:13px;letter-spacing:.4px;margin:14px 0 16px}
h1{font-family:'Fraunces',serif;font-weight:500;font-size:30px;line-height:1.2;margin:0 0 14px}
h2{font-family:'Fraunces',serif;font-weight:500;font-size:24px;line-height:1.25;margin:0 0 12px}
.lede{color:var(--ink-dim);font-size:16px;line-height:1.6;margin:0 0 24px}
p{font-size:15px;line-height:1.6}
.proof{background:var(--surface-2);border-left:3px solid var(--accent);border-radius:0 12px 12px 0;
  padding:15px 18px;margin:0 0 28px}
.proof p{margin:0;color:var(--ink-dim);font-size:14px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;
  border-radius:14px;padding:16px;font-family:'Manrope',sans-serif;font-size:16px;font-weight:600;cursor:pointer;text-decoration:none}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:active{transform:scale(.985)}
.btn-ghost{background:transparent;color:var(--ink-dim);border:1px solid var(--line);font-weight:500;font-size:15px;padding:14px}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.gap{height:10px}
.foot{color:var(--mute);font-size:12px;text-align:center;margin-top:auto;padding-top:24px}
.foot a{color:var(--mute);text-decoration:none;border-bottom:1px solid var(--line)}

/* демо-карточка */
.card{background:var(--surface);border:1px solid var(--line);border-radius:20px;overflow:hidden;margin:4px 0 18px}
.card-photo{height:130px;background:var(--surface-2);display:flex;align-items:center;justify-content:center}
.card-body{padding:16px 18px 20px}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:6px 12px;border-radius:9px;margin:0 0 12px}
.b-mid{background:var(--mid-bg);color:var(--mid-fg)}
.ctitle{font-family:'Fraunces',serif;font-weight:500;font-size:19px;margin:0 0 3px}
.csub{color:var(--ink-dim);font-size:14px;margin:0 0 14px}
.crow{display:flex;gap:8px;color:var(--mute);font-size:13px;line-height:1.5;margin:0 0 8px}
.crow .ic{color:var(--accent);flex:none;margin-top:1px}

/* шаги */
.steps{margin:0 0 24px;padding:0;list-style:none}
.step{display:flex;gap:14px;align-items:flex-start;margin:0 0 16px}
.snum{flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:var(--surface-2);color:var(--accent);
  display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px}
.step p{margin:4px 0 0;color:var(--ink-dim);font-size:15px}
.note{color:var(--mute);font-size:13px;line-height:1.55;margin:0 0 24px}

/* коммерческий блок / блоки метода */
.block{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin:0 0 14px}
.block h3{font-family:'Manrope';font-size:16px;font-weight:600;margin:0 0 6px;color:var(--ink)}
.block p{margin:0;color:var(--ink-dim);font-size:14px;line-height:1.55}
.tag{display:inline-block;background:var(--surface-2);color:var(--accent);font-size:12px;font-weight:600;
  padding:5px 12px;border-radius:8px;margin:0 0 16px}

/* нижний таб */
.tabbar{flex:0 0 auto;display:none;border-top:1px solid var(--line);background:var(--bg)}
.tabbar.on{display:flex}
.tab{flex:1;background:none;border:none;color:var(--mute);font-family:'Manrope';font-size:11px;
  padding:10px 4px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
.tab.act{color:var(--accent)}
.tab .ic{font-size:20px;line-height:1}
.sr-only{position:absolute;left:-9999px}
</style>

    '<button class="tab" data-v="flyer"><span class="ic">'+I.tF+'</span>'+t.tabFlyer+'</button>'+
    '<button class="tab" data-v="pro"><span class="ic">'+I.tP+'</span>'+t.tabPro+'</button>'+
    '<button class="tab" data-v="method"><span class="ic">'+I.tM+'</span>'+t.tabMethod+'</button>';
  document.querySelectorAll('.tab').forEach(b=> b.onclick=()=>go(b.dataset.v));
  markTab();
}

let current='intro';
function go(v){
  current=v;
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('on'));
  document.getElementById('v-'+v).classList.add('on');
  const tb=document.getElementById('tabbar');
  if(v==='intro') tb.classList.remove('on'); else tb.classList.add('on');
  markTab();
  window.scrollTo(0,0);
}
function markTab(){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('act', b.dataset.v===current));
}

/* язык: ru → en → pt → (de/es/fr — скоро) → ru */
document.getElementById('langBtn').onclick=()=>{
  const live=Object.keys(L);
  let i=live.indexOf(lang);
  lang=live[(i+1)%live.length];
  render(); go(current);
};
document.getElementById('themeBtn').onclick=()=>{
  theme = theme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', theme==='light'?'light':'');
  document.getElementById('themeBtn').textContent = theme==='dark'?'☀':'☾';
};

render();
</script>
